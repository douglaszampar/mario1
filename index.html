<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student vs Teacher</title>

<style>

body{
font-family:Arial;
background:#0E1D2E;
color:white;
text-align:center;
}

h1{
margin-top:20px;
}

.board{
display:grid;
grid-template-columns:repeat(3,130px);
gap:10px;
justify-content:center;
margin-top:30px;
}

.cell{
width:130px;
height:130px;
background:#1f2f45;
display:flex;
align-items:center;
justify-content:center;
font-size:50px;
cursor:pointer;
}

.cell:hover{
background:#2b4163;
}

iframe{
margin-top:30px;
width:700px;
height:300px;
border:none;
background:white;
border-radius:8px;
}

button{
margin-top:20px;
padding:10px 25px;
font-size:18px;
cursor:pointer;
}

</style>
</head>

<body>

<h1>Student vs Teacher</h1>

<div class="board" id="board"></div>

<iframe id="questionFrame"></iframe>

<br>

<button onclick="resetGame()">Reset Game</button>

<script src="game.js"></script>

</body>
</html>
