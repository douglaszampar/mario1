<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tic Tac Toe</title>

<style>

body{
font-family:Arial;
background:#0E1D2E;
color:white;
text-align:center;
}

.board{
display:grid;
grid-template-columns:repeat(3,120px);
gap:10px;
justify-content:center;
margin-top:40px;
}

.cell{
width:120px;
height:120px;
background:#1f2f45;
display:flex;
align-items:center;
justify-content:center;
font-size:40px;
cursor:pointer;
}

iframe{
margin-top:40px;
width:600px;
height:300px;
border:none;
background:white;
}

</style>
</head>

<body>

<h1>Student vs Teacher</h1>

<div class="board" id="board"></div>

<iframe id="questionFrame"></iframe>

<script src="game.js"></script>

</body>
</html>
